.tree-wrapper{

.tree{
    transform-origin:0 0;
    transition: transform 0.1s ease;
    padding:20px;
}

.tree ul{
    list-style:none;
    padding-left:30px;
    position:relative;
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height 0.4s ease, opacity 0.3s ease;
}

.tree ul.open{
    max-height:5000px;
    opacity:1;
}

.tree li{
    position:relative;
    margin:15px 0;
    padding-left:20px;
}

.tree li::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:2px;
    height:100%;
    background:#ccc;
}

.tree li::after{
    content:'';
    position:absolute;
    top:20px;
    left:0;
    width:20px;
    height:2px;
    background:#ccc;
}

.tree > ul > li::before,
.tree > ul > li::after{
    display:none;
}

.member{
    display:flex;
    align-items:center;
    gap:12px;
    padding:8px 14px;
    border-radius:6px;
    box-shadow:0 3px 6px rgba(0,0,0,0.2);

.name{

.gen-1{ background:#8e44ad; }
.gen-2{ background:#2980b9; }
.gen-3{ background:#27ae60; }
.gen-4{ background:#e67e22; }
.gen-5{ background:#c0392b; }

.highlight{
    box-shadow:0 0 15px 5px yellow;
    animation:pulse 1s infinite alternate;

@keyframes pulse{

    to{box-shadow:0 0 20px 8px orange;}

function checkCelebrations(){

messages.push("🎂 Happy Birthday "+person+" 🎉");
}
}

for(let couple in weddingData){

let wed=weddingData[couple];
if(!wed) continue;

let parts = wed.split(" ");

let wedMonth = parts[1];

messages.push("💍 Happy Wedding Anniversary "+couple+" 💖");
}

/* BUILD TREE — unchanged */

function buildTree(node,parent,generation){

let li=document.createElement("li");
let div=document.createElement("div");div.dataset.name = node.name.toUpperCase();
div.className="member gen-"+generation;

let photo=document.createElement("img");
photo.className="photo";

/* DEFAULT CLOUD PHOTO FOR JOMAL */

let defaultPhotos={
"JOMAL":"https://www.dropbox.com/scl/fi/6lhxeuazi96ywzp6wt3db/IMG_20251114_210808.jpg?rlkey=2k60l9lpdp2epkiihf68deab8&raw=1"
};

let savedPhoto=localStorage.getItem(getPhotoKey(node.name));

if(savedPhoto){
photo.src=savedPhoto;
}else if(defaultPhotos[node.name.toUpperCase()]){
photo.src=defaultPhotos[node.name.toUpperCase()];
}

photo.onclick=function(e){
e.stopPropagation();

let input=document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange=function(){

let file=input.files[0];
let reader=new FileReader();

reader.onload=function(){
photo.src=reader.result;
localStorage.setItem(getPhotoKey(node.name),reader.result);
};

reader.readAsDataURL(file);
};

input.click();
};

let details=document.createElement("div");
details.className="details";

let name=document.createElement("div");
name.className="name";
name.innerText=node.name;

let upper=node.name.toUpperCase();

if(upper.includes("&")){

let secondName=upper.split("&")[1].trim();

let familyLine=document.createElement("div");
familyLine.innerText= secondName+" - House Name : "+(familyNameData[secondName] || "");

let dobLine=document.createElement("div");

let people=upper.split("&");

let dobText=people.map(p=>{
let person=p.trim();
return dobData[person] ? person+": "+dobData[person] : person+": ";
}).join(" | ");

dobLine.innerText="DOB: "+dobText;

let weddingLine=document.createElement("div");
weddingLine.innerText="Wedding : "+(weddingData[upper] || "");

details.appendChild(name);
details.appendChild(familyLine);
details.appendChild(dobLine);
details.appendChild(weddingLine);

}else{

div.appendChild(details);

};

});

}

/* LIVE SEARCH */

function searchPerson(){

let keyword = document
.getElementById("searchBox")
.value.trim()
.toUpperCase();

/* REMOVE OLD HIGHLIGHTS */

document.querySelectorAll(".member")
.forEach(m=>m.classList.remove("highlight"));

/* COLLAPSE ENTIRE TREE */

document.querySelectorAll(".tree ul")
.forEach(ul=>{
if(ul.id !== "treeRoot"){
ul.classList.remove("open");
}
});

if(!keyword) return;

/* FIND EXACT MATCH */

let match = null;

document.querySelectorAll(".member")
.forEach(div=>{

let name = div.dataset.name || "";

if(name.includes(keyword) && !match){
match = div;
}

});

if(!match){
alert("No family member found");
return;
}

/* OPEN ONLY ITS PARENT CHAIN */

let current = match;

while(current){

let li = current.closest("li");
if(!li) break;

let parentUL = li.parentElement;

if(parentUL){
parentUL.classList.add("open");
}

let parentLI = parentUL.closest("li");

current = parentLI
? parentLI.querySelector(".member")
: null;
}

/* HIGHLIGHT */

match.classList.add("highlight");

/* SCROLL INTO VIEW */

match.scrollIntoView({
behavior:"smooth",
block:"center"
});

}

/* ZOOM */

let scale=1,posX=0,posY=0;
let tree=document.getElementById("tree");
let wrapper=document.getElementById("treeWrapper");


let isDragging=false,startX,startY;

wrapper.addEventListener("mousedown",e=>{
isDragging=true;
startX=e.clientX-posX;
startY=e.clientY-posY;
wrapper.style.cursor="grabbing";
});

wrapper.addEventListener("mouseup",()=>{
isDragging=false;
wrapper.style.cursor="grab";
});

wrapper.addEventListener("mousemove",e=>{
if(!isDragging) return;
posX=e.clientX-startX;
posY=e.clientY-startY;
updateTransform();
});

function updateTransform(){
tree.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`;
}
